name: xcn-similarity

services:
  api:
    image: ${SIM_IMAGE_REPO:-xcn-similarity}/api:${SIM_IMAGE_TAG:-1.0.0}
    build:
      context: .
      dockerfile: Dockerfile.offline
    container_name: xcn-similarity-api
    working_dir: /app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8010:8000"
      - "18080:8000"
    gpus:
      - device_ids:
          - ${NVIDIA_VISIBLE_DEVICES:-1}
        capabilities:
          - gpu
    environment:
      TZ: ${TZ:-Asia/Seoul}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-1}
      CUDA_VISIBLE_DEVICES: ${CUDA_VISIBLE_DEVICES:-1}
      SIM_MILVUS_URL: ${SIM_MILVUS_URL:-http://milvus:19530}
      SIM_PRODUCT_MODE: ${SIM_PRODUCT_MODE:-standalone}
      SIM_ADMIN_UI_ENABLED: ${SIM_ADMIN_UI_ENABLED:-false}
      SIM_SECURITY_INSIGHT_ENABLED: ${SIM_SECURITY_INSIGHT_ENABLED:-auto}
      SIM_LLM_ENABLED: ${SIM_LLM_ENABLED:-false}
      SIM_MANUAL_REVIEW_ENABLED: ${SIM_MANUAL_REVIEW_ENABLED:-auto}
      SIM_RECENT_MATCH_CACHE_ENABLED: ${SIM_RECENT_MATCH_CACHE_ENABLED:-auto}
      SIM_MILVUS_OBJECT_ROOT: ${SIM_MILVUS_OBJECT_ROOT:-/minio_data/a-bucket/files}
      SIM_STORAGE_STATS_TTL_SEC: ${SIM_STORAGE_STATS_TTL_SEC:-300}
      SIM_EMBEDDER_BACKEND: ${SIM_EMBEDDER_BACKEND:-hf_transformer}
      SIM_EMBEDDING_DIM: ${SIM_EMBEDDING_DIM:-1024}
      SIM_EMBEDDING_MODEL_PATH: ${SIM_EMBEDDING_MODEL_PATH:-/models/upskyy_bge_m3_korean}
      TRANSFORMERS_OFFLINE: ${TRANSFORMERS_OFFLINE:-1}
      HF_DATASETS_OFFLINE: ${HF_DATASETS_OFFLINE:-1}
      SIM_CHUNK_SIZE: ${SIM_CHUNK_SIZE:-1800}
      SIM_CHUNK_OVERLAP: ${SIM_CHUNK_OVERLAP:-250}
      SIM_MIN_CHUNK_CHARS: ${SIM_MIN_CHUNK_CHARS:-50}
      SIM_MAX_DOCUMENT_CHUNKS: ${SIM_MAX_DOCUMENT_CHUNKS:-5000}
      SIM_MAX_LOG_CHUNKS: ${SIM_MAX_LOG_CHUNKS:-100}
      SIM_MAX_MIDDLEWARE_CHUNKS: ${SIM_MAX_MIDDLEWARE_CHUNKS:-100}
      SIM_MAX_MIDDLEWARE_CHARS: ${SIM_MAX_MIDDLEWARE_CHARS:-2000000}
      SIM_MAX_MIDDLEWARE_ITEM_CHARS: ${SIM_MAX_MIDDLEWARE_ITEM_CHARS:-800000}
      SIM_MAX_UPLOAD_MB: ${SIM_MAX_UPLOAD_MB:-300}
      SIM_MULTI_UPLOAD_MAX_FILES: ${SIM_MULTI_UPLOAD_MAX_FILES:-50}
      SIM_ARCHIVE_MAX_FILES: ${SIM_ARCHIVE_MAX_FILES:-500}
      SIM_ARCHIVE_MAX_TOTAL_MB: ${SIM_ARCHIVE_MAX_TOTAL_MB:-1024}
      SIM_ARCHIVE_MAX_MEMBER_MB: ${SIM_ARCHIVE_MAX_MEMBER_MB:-100}
      SIM_UPLOAD_RETAIN_ORIGINAL: ${SIM_UPLOAD_RETAIN_ORIGINAL:-true}
      SIM_UPLOAD_DELETED_RETENTION_DAYS: ${SIM_UPLOAD_DELETED_RETENTION_DAYS:-0}
      SIM_SEARCH_UPLOAD_RETENTION_DAYS: ${SIM_SEARCH_UPLOAD_RETENTION_DAYS:-7}
      SIM_RECENT_MATCH_MIN_SCORE: ${SIM_RECENT_MATCH_MIN_SCORE:-0.82}
      SIM_RECENT_MATCH_LOG_LIMIT: ${SIM_RECENT_MATCH_LOG_LIMIT:-50}
      SIM_RECENT_MATCH_LIMIT: ${SIM_RECENT_MATCH_LIMIT:-20}
      SIM_RECENT_MATCH_DAYS: ${SIM_RECENT_MATCH_DAYS:-30}
      SIM_RECENT_MATCH_CACHE_TTL_SEC: ${SIM_RECENT_MATCH_CACHE_TTL_SEC:-1800}
      SIM_RECENT_MATCH_INCLUDE_DEFAULT_PARTITION: ${SIM_RECENT_MATCH_INCLUDE_DEFAULT_PARTITION:-true}
      SIM_RECENT_MATCH_DOCUMENT_LIMIT: ${SIM_RECENT_MATCH_DOCUMENT_LIMIT:-0}
      SIM_RECENT_MATCH_DOCUMENT_RECENT_DAYS: ${SIM_RECENT_MATCH_DOCUMENT_RECENT_DAYS:-365}
      SIM_SEARCH_LOGS_DEFAULT_DAYS: ${SIM_SEARCH_LOGS_DEFAULT_DAYS:-30}
      SIM_SEARCH_LOGS_MAX_DOCUMENT_CHUNKS: ${SIM_SEARCH_LOGS_MAX_DOCUMENT_CHUNKS:-8}
      SIM_SEARCH_LOGS_PARALLELISM: ${SIM_SEARCH_LOGS_PARALLELISM:-4}
      SIM_SEARCH_LOGS_CACHE_ENABLED: ${SIM_SEARCH_LOGS_CACHE_ENABLED:-true}
      SIM_SEARCH_LOGS_CACHE_TTL_SEC: ${SIM_SEARCH_LOGS_CACHE_TTL_SEC:-300}
      SIM_SEARCH_LOGS_INCLUDE_DEFAULT_PARTITION: ${SIM_SEARCH_LOGS_INCLUDE_DEFAULT_PARTITION:-true}
      SIM_SIMILARITY_RESULT_ENABLED: ${SIM_SIMILARITY_RESULT_ENABLED:-true}
      SIM_SIMILARITY_RESULT_MIN_SCORE: ${SIM_SIMILARITY_RESULT_MIN_SCORE:-0.82}
      SIM_SIMILARITY_RESULT_TOP_K: ${SIM_SIMILARITY_RESULT_TOP_K:-5}
      SIM_SIMILARITY_RESULT_SEARCH_RETRIES: ${SIM_SIMILARITY_RESULT_SEARCH_RETRIES:-5}
      SIM_SIMILARITY_RESULT_SEARCH_RETRY_DELAY_SEC: ${SIM_SIMILARITY_RESULT_SEARCH_RETRY_DELAY_SEC:-0.5}
      SIM_SIMILARITY_RESULT_RECENT_DOCUMENT_WINDOW_SEC: ${SIM_SIMILARITY_RESULT_RECENT_DOCUMENT_WINDOW_SEC:-30}
      SIM_SIMILARITY_RESULT_COLLECTION: ${SIM_SIMILARITY_RESULT_COLLECTION:-SIM_SIMILARITY_RESULT}
      SIM_KAFKA_ENABLED: ${SIM_KAFKA_ENABLED:-false}
      SIM_KAFKA_BOOTSTRAP_SERVERS: ${SIM_KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      SIM_KAFKA_TOPIC: ${SIM_KAFKA_TOPIC:-analysis_result}
      SIM_KAFKA_CLIENT_ID: ${SIM_KAFKA_CLIENT_ID:-xcn-similarity}
      SIM_KAFKA_TIMEOUT_SEC: ${SIM_KAFKA_TIMEOUT_SEC:-5}
      EMS_MONGO_URI: "${EMS_MONGO_URI:-mongodb://mongodb:27017/venus?serverSelectionTimeoutMS=5000&connectTimeoutMS=10000}"
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      SIM_MIDDLEWARE_BASE_URL: ${SIM_MIDDLEWARE_BASE_URL:-}
      SIM_MIDDLEWARE_RESULT_PATH: ${SIM_MIDDLEWARE_RESULT_PATH:-/similarity/result}
      SIM_MIDDLEWARE_TIMEOUT_SEC: ${SIM_MIDDLEWARE_TIMEOUT_SEC:-60}
      SIM_MONITOR_PATHS: ${SIM_MONITOR_PATHS:-/,/logs,/minio_data}
      SIM_DISK_WARN_PERCENT: ${SIM_DISK_WARN_PERCENT:-80}
      SIM_DISK_CRITICAL_PERCENT: ${SIM_DISK_CRITICAL_PERCENT:-90}
      SIM_VECTOR_ROW_WARN_COUNT: ${SIM_VECTOR_ROW_WARN_COUNT:-50000000}
      SIM_RETENTION_HOT_DAYS: ${SIM_RETENTION_HOT_DAYS:-90}
      SIM_RETENTION_WARM_DAYS: ${SIM_RETENTION_WARM_DAYS:-365}
      SIM_RETENTION_ARCHIVE_DAYS: ${SIM_RETENTION_ARCHIVE_DAYS:-1095}
      SIM_LOG_DELETE_BEFORE_DAYS: ${SIM_LOG_DELETE_BEFORE_DAYS:-365}
      SIM_LOG_RETENTION_SVC: ${SIM_LOG_RETENTION_SVC:-}
      SIM_LOG_RETENTION_POLICY: ${SIM_LOG_RETENTION_POLICY:-*=365}
      SIM_LOG_RETENTION_DELETE_RESULTS: ${SIM_LOG_RETENTION_DELETE_RESULTS:-true}
      SIM_LOG_RETENTION_DELETE_REVIEWS: ${SIM_LOG_RETENTION_DELETE_REVIEWS:-false}
      SIM_LOG_RETENTION_CLEAR_MATCH_CACHE: ${SIM_LOG_RETENTION_CLEAR_MATCH_CACHE:-false}
      SIM_CLEANUP_ENABLED: ${SIM_CLEANUP_ENABLED:-true}
      SIM_CLEANUP_INTERVAL_SEC: ${SIM_CLEANUP_INTERVAL_SEC:-86400}
      SIM_CLEANUP_DRY_RUN: ${SIM_CLEANUP_DRY_RUN:-false}
      SIM_RESULT_RETENTION_DAYS: ${SIM_RESULT_RETENTION_DAYS:-0}
      SIM_MATCH_CACHE_RETENTION_DAYS: ${SIM_MATCH_CACHE_RETENTION_DAYS:-7}
      SIM_REVIEW_RETENTION_DAYS: ${SIM_REVIEW_RETENTION_DAYS:-0}
      SIM_LLM_URL: "${SIM_LLM_URL:-}"
      SIM_LLM_MODEL: ${SIM_LLM_MODEL:-qwen3.5-27b-fp8}
      SIM_LLM_TIMEOUT_SEC: ${SIM_LLM_TIMEOUT_SEC:-60}
      SIM_INSIGHT_INTERVAL_SEC: ${SIM_INSIGHT_INTERVAL_SEC:-3600}
      SIM_INSIGHT_HISTORY_DAYS: ${SIM_INSIGHT_HISTORY_DAYS:-7}
      SIM_INSIGHT_COLLECTION: ${SIM_INSIGHT_COLLECTION:-SIM_SECURITY_INSIGHT}
      SIM_UPLOAD_DIR: /logs/uploads
      SIM_FILE_LOG_ENABLED: ${SIM_FILE_LOG_ENABLED:-true}
      SIM_LOG_DIR: /logs
      SIM_LOG_LEVEL: ${SIM_LOG_LEVEL:-INFO}
      SIM_LOG_ROTATE_WHEN: ${SIM_LOG_ROTATE_WHEN:-midnight}
      SIM_LOG_BACKUP_DAYS: ${SIM_LOG_BACKUP_DAYS:-30}
      SIM_LOG_BACKUP_COUNT: ${SIM_LOG_BACKUP_COUNT:-30}
      SIM_LOG_MAX_BYTES: ${SIM_LOG_MAX_BYTES:-0}
      SIM_CATALOG_MONGO_URI: "${SIM_CATALOG_MONGO_URI:-mongodb://mongodb:27017/xcn_similarity?serverSelectionTimeoutMS=5000&connectTimeoutMS=10000}"
      SIM_CATALOG_DATABASE: ${SIM_CATALOG_DATABASE:-xcn_similarity}
      SIM_LOG_CATALOG_COLLECTION: ${SIM_LOG_CATALOG_COLLECTION:-SIM_LOG_CATALOG}
      SIM_DOCUMENT_CATALOG_COLLECTION: ${SIM_DOCUMENT_CATALOG_COLLECTION:-SIM_DOCUMENT_CATALOG}
      SIM_REVIEW_COLLECTION: ${SIM_REVIEW_COLLECTION:-SIM_MATCH_REVIEW}
      SIM_MATCH_CACHE_COLLECTION: ${SIM_MATCH_CACHE_COLLECTION:-SIM_MATCH_CACHE}
    volumes:
      - /etc/hosts:/etc/hosts:ro
      - ./logs:/logs
      - ${SIM_MODELS_VOLUME:-/data01/models}:/models:ro
      - ${SIM_MILVUS_MINIO_VOLUME:-/data01/xcn-similarity/data/minio}:/minio_data:ro
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    restart: unless-stopped

  indexer:
    profiles: ["indexer"]
    image: ${SIM_IMAGE_REPO:-xcn-similarity}/api:${SIM_IMAGE_TAG:-1.0.0}
    container_name: xcn-similarity-indexer
    working_dir: /work
    command:
      - python
      - tools/index_ems.py
      - --loop
      - --interval-sec
      - ${EMS_INDEX_INTERVAL_SEC:-60}
      - --batch-size
      - ${EMS_INDEX_BATCH_SIZE:-500}
      - --post-batch-size
      - ${EMS_INDEX_POST_BATCH_SIZE:-50}
      - --post-retries
      - ${EMS_INDEX_POST_RETRIES:-5}
      - --post-retry-delay-sec
      - ${EMS_INDEX_POST_RETRY_DELAY_SEC:-5}
      - --months
      - ${EMS_INDEX_MONTHS:-auto_recent}
      - --months-lookback
      - ${EMS_INDEX_MONTHS_LOOKBACK:-2}
      - --seed-state-file
      - ${EMS_INDEX_SEED_STATE_FILE:-}
    environment:
      TZ: ${TZ:-Asia/Seoul}
      PYTHONPATH: /work:/work/vendor
      EMS_MONGO_URI: "${EMS_MONGO_URI:-mongodb://mongodb:27017/venus?serverSelectionTimeoutMS=5000&connectTimeoutMS=10000}"
      SIM_API_URL: http://xcn-similarity-api:8000
      SIM_CATALOG_MONGO_URI: "${SIM_CATALOG_MONGO_URI:-mongodb://mongodb:27017/xcn_similarity?serverSelectionTimeoutMS=5000&connectTimeoutMS=10000}"
      SIM_CATALOG_DATABASE: ${SIM_CATALOG_DATABASE:-xcn_similarity}
      SIM_INDEXER_STATE_COLLECTION: ${SIM_INDEXER_STATE_COLLECTION:-SIM_INDEXER_STATE}
      SIM_INDEXER_FAILED_COLLECTION: ${SIM_INDEXER_FAILED_COLLECTION:-SIM_INDEXER_FAILED}
      EMS_INDEX_BODY: ${EMS_INDEX_BODY:-true}
      EMS_INDEX_ATTACH: ${EMS_INDEX_ATTACH:-true}
      EMS_INDEX_CURSOR_FIELD: ${EMS_INDEX_CURSOR_FIELD:-ltime}
      EMS_INDEX_TIMEZONE: ${EMS_INDEX_TIMEZONE:-Asia/Seoul}
      EMS_INDEX_ENSURE_SOURCE_INDEXES: ${EMS_INDEX_ENSURE_SOURCE_INDEXES:-true}
      EMS_INDEX_DIRECT_ENABLED: ${EMS_INDEX_DIRECT_ENABLED:-false}
      EMS_INDEX_MONTHS_LOOKBACK: ${EMS_INDEX_MONTHS_LOOKBACK:-2}
      EMS_INDEX_EXCLUDE_SVC: ${EMS_INDEX_EXCLUDE_SVC:-FGIS}
      EMS_INDEX_EXCLUDE_SVC_PREFIX: ${EMS_INDEX_EXCLUDE_SVC_PREFIX:-FGI}
      EMS_INDEX_SEED_MISSING_RECENT: ${EMS_INDEX_SEED_MISSING_RECENT:-true}
      EMS_INDEX_RECENT_SWEEP_HOURS: ${EMS_INDEX_RECENT_SWEEP_HOURS:-0}
      EMS_INDEX_RECENT_SWEEP_LIMIT: ${EMS_INDEX_RECENT_SWEEP_LIMIT:-1000}
      EMS_INDEX_RECONCILE_DAYS: ${EMS_INDEX_RECONCILE_DAYS:-2}
      EMS_INDEX_RECONCILE_LIMIT: ${EMS_INDEX_RECONCILE_LIMIT:-5000}
      SIM_LOG_CATALOG_COLLECTION: ${SIM_LOG_CATALOG_COLLECTION:-SIM_LOG_CATALOG}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - /etc/hosts:/etc/hosts:ro
      - .:/work
    depends_on:
      - api
    restart: unless-stopped

  kafka:
    profiles: ["kafka"]
    container_name: xcn-similarity-kafka
    image: ${KAFKA_IMAGE:-xcn-similarity/kafka:latest}
    environment:
      TZ: ${TZ:-Asia/Seoul}
      CLUSTER_ID: xcnSimilarityKafka01
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,EXTERNAL://:19092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://10.100.40.52:19092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
    ports:
      - "19092:19092"
    volumes:
      - /data01/xcn-similarity/data/kafka:/tmp/kraft-combined-logs
    restart: unless-stopped
